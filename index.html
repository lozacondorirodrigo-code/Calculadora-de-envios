<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rodri Envíos PRO MAX</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; padding:10px;}
input, button { padding:10px; margin:6px; font-size:15px; width:90%; border-radius:10px; border:none;}
button { background:#22c55e; color:white;}
.copy { background:#3b82f6;}
.result { font-size:18px; color:#facc15;}
.small { font-size:14px; color:#94a3b8;}
</style>
</head>

<body>

<h2>💸 Rodri Envíos PRO MAX</h2>

<h3>⚙️ Cambio del día</h3>
<input type="number" id="usdtars" placeholder="USDT ARS">
<input type="number" id="usdtbs" placeholder="USDT Bs">
<button onclick="guardarCambio()">💾 Guardar cambio</button>

<hr>

<h3>💰 Nueva operación</h3>
<input type="text" id="cliente" placeholder="Cliente (opcional)">
<input type="number" id="bs" placeholder="Monto en Bs">

<button onclick="calcular()">Calcular</button>
<button class="copy" onclick="copiar()">📲 Copiar</button>

<div class="result" id="resultado"></div>
<div class="small" id="detalle"></div>

<script>

let mensaje = "";

function guardarCambio(){
  let usdtars = parseFloat(document.getElementById("usdtars").value);
  let usdtbs = parseFloat(document.getElementById("usdtbs").value);

  let tipoReal = usdtars / usdtbs;

  localStorage.setItem("tipoReal", tipoReal);
  alert("Cambio base guardado ✔");
}

function obtenerPorcentaje(bs){
  if(bs >= 100 && bs <= 300) return 8;
  if(bs <= 700) return 7;
  if(bs <= 1000) return 6.5;
  if(bs <= 1500) return 6;
  if(bs <= 2500) return 5;
  if(bs <= 4000) return 4.5;
  if(bs <= 6000) return 4;
  return 3;
}

function calcular(){
  let bs = parseFloat(document.getElementById("bs").value);
  let cliente = document.getElementById("cliente").value || "Cliente";

  let tipoReal = parseFloat(localStorage.getItem("tipoReal"));

  if(!tipoReal){
    alert("Primero configura el cambio ⚠️");
    return;
  }

  let porcentaje = obtenerPorcentaje(bs);
  let tipoFinal = tipoReal * (1 + porcentaje/100);

  let cobrar = bs * tipoFinal;
  let costo = bs * tipoReal;
  let ganancia = cobrar - costo;

  document.getElementById("resultado").innerHTML =
    "💰 Cobrar: " + cobrar.toLocaleString() + " ARS";

  document.getElementById("detalle").innerHTML =
    "📊 % aplicado: " + porcentaje + "% | Ganancia: " + ganancia.toLocaleString() + " ARS";

  mensaje = "💸 Envío a Bolivia con Rodri 🇧🇴\n" +
            "Cliente: " + cliente +
            "\nMonto: " + bs + " Bs" +
            "\nTotal: " + cobrar.toLocaleString() + " ARS";

}

function copiar(){
  navigator.clipboard.writeText(mensaje);
  alert("Mensaje copiado ✔");
}

</script>

</body>
</html>
