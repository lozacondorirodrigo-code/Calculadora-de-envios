<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rodri Envíos PRO</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; padding:10px;}
input, button { padding:10px; margin:6px; font-size:15px; width:90%; border-radius:10px; border:none;}
button { background:#22c55e; color:white;}
.copy { background:#3b82f6;}
.result { font-size:18px; color:#facc15;}
.small { font-size:14px; color:#94a3b8;}
</style>
</head>

<body>

<h2>💸 Rodri Envíos PRO</h2>

<h3>⚙️ Cambio del día</h3>
<input type="text" id="usdtars" placeholder="USDT ARS (ej: 1450)">
<input type="text" id="usdtbs" placeholder="USDT Bs (ej: 9.45)">
<button onclick="guardarCambio()">💾 Guardar cambio</button>

<hr>

<h3>💰 Nueva operación</h3>
<input type="text" id="cliente" placeholder="Cliente (opcional)">
<input type="text" id="bs" placeholder="Monto en Bs">

<label>
<input type="checkbox" id="vip"> Cliente frecuente ⭐
</label>

<br><br>

<button onclick="calcular()">Calcular</button>
<button class="copy" onclick="copiar()">📲 Copiar</button>

<div class="result" id="resultado"></div>
<div class="small" id="detalle"></div>

<script>

let mensaje = "";

// 🔹 FUNCIÓN SEGURA (ACEPTA COMA Y PUNTO)
function num(valor){
  if(!valor) return 0;
  return parseFloat(valor.toString().replace(",", "."));
}

// 🔹 GUARDAR CAMBIO
function guardarCambio(){
  let ars = num(document.getElementById("usdtars").value);
  let bs = num(document.getElementById("usdtbs").value);

  if(ars <= 0 || bs <= 0){
    alert("Ingresa valores válidos ⚠️");
    return;
  }

  let tipoReal = ars / bs;

  localStorage.setItem("tipoReal", tipoReal);
  localStorage.setItem("usdtars", ars);
  localStorage.setItem("usdtbs", bs);

  alert("Cambio guardado ✔");
}

// 🔹 PORCENTAJES
function porcentaje(bs){
  if(bs >= 100 && bs <= 300) return 8;
  if(bs <= 700) return 7;
  if(bs <= 1000) return 6.5;
  if(bs <= 1500) return 6;
  if(bs <= 2500) return 5;
  if(bs <= 4000) return 4.5;
  if(bs <= 6000) return 4;
  return 3;
}

// 🔹 CALCULAR
function calcular(){

  let monto = num(document.getElementById("bs").value);
  let cliente = document.getElementById("cliente").value || "Cliente";

  let tipoReal = num(localStorage.getItem("tipoReal"));

  if(tipoReal <= 0){
    alert("Primero guarda el cambio ⚠️");
    return;
  }

  if(monto <= 0){
    alert("Ingresa monto válido ⚠️");
    return;
  }

  let p = porcentaje(monto);

  // VIP
  let vip = document.getElementById("vip").checked;
  if(vip && monto >= 300 && monto <= 2000){
    p -= 0.5;
  }

  let tipoFinal = tipoReal * (1 + p/100);
  let total = monto * tipoFinal;
  let ganancia = total - (monto * tipoReal);

  document.getElementById("resultado").innerHTML =
    "💰 Cobrar: " + total.toLocaleString() + " ARS";

  document.getElementById("detalle").innerHTML =
    "📊 %: " + p + "% | Ganancia: " + ganancia.toLocaleString() + " ARS";

  mensaje = "💸 Envío a Bolivia con Rodri 🇧🇴\n" +
            "Cliente: " + cliente +
            "\nMonto: " + monto + " Bs" +
            "\nTotal: " + total.toLocaleString() + " ARS\n" +
            "✔ Seguro y confiable";
}

// 🔹 COPIAR
function copiar(){
  if(!mensaje){
    alert("Primero calcula ⚠️");
    return;
  }
  navigator.clipboard.writeText(mensaje);
  alert("Mensaje copiado ✔");
}

// 🔹 CARGAR DATOS
window.onload = function(){
  document.getElementById("usdtars").value = localStorage.getItem("usdtars") || "";
  document.getElementById("usdtbs").value = localStorage.getItem("usdtbs") || "";
}

</script>

</body>
</html>
