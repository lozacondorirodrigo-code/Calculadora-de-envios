<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora PRO Cambio</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}
input, button {
  padding: 12px;
  margin: 8px;
  font-size: 16px;
  width: 90%;
  border-radius: 10px;
  border: none;
}
button {
  background: #22c55e;
  color: white;
}
.result {
  margin-top: 15px;
  font-size: 20px;
  color: #facc15;
}
.small {
  font-size: 15px;
  color: #94a3b8;
}
</style>
</head>

<body>

<h2>💸 Calculadora PRO Bolivia</h2>

<input type="number" id="usdtars" placeholder="USDT en ARS (ej: 1450)">
<input type="number" id="usdtbs" placeholder="USDT en Bs (ej: 9.45)">

<input type="number" id="ganancia" value="5" placeholder="% ganancia">

<hr>

<input type="number" id="bs" placeholder="Monto en Bs a enviar">

<button onclick="calcular()">Calcular</button>

<div class="result" id="tipo"></div>
<div class="result" id="resultado"></div>
<div class="small" id="gananciafinal"></div>

<script>
function calcular() {
  let usdtars = parseFloat(document.getElementById("usdtars").value);
  let usdtbs = parseFloat(document.getElementById("usdtbs").value);
  let porcentaje = parseFloat(document.getElementById("ganancia").value);
  let bs = parseFloat(document.getElementById("bs").value);

  let tipoReal = usdtars / usdtbs;
  let tipoFinal = tipoReal * (1 + porcentaje/100);

  let cobrar = bs * tipoFinal;
  let base = bs * tipoReal;
  let ganancia = cobrar - base;

  document.getElementById("tipo").innerHTML =
    "📊 Tipo real: " + tipoReal.toFixed(2) + 
    " → Tu cambio: " + tipoFinal.toFixed(2);

  document.getElementById("resultado").innerHTML =
    "💰 Cobrar: " + cobrar.toLocaleString() + " ARS";

  document.getElementById("gananciafinal").innerHTML =
    "📈 Ganancia: " + ganancia.toLocaleString() + " ARS";
}
</script>

</body>
</html>
