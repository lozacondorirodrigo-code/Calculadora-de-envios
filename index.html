<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rodri Envíos PRO MAX</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; padding:10px;}
input, select, button {
  padding:12px; margin:6px; font-size:16px;
  width:90%; border-radius:10px; border:none;
}
button { background:#22c55e; color:white;}
.copy { background:#3b82f6;}
.result { font-size:20px; color:#facc15;}
.small { font-size:14px; color:#94a3b8;}
</style>
</head>

<body>

<h2>💸 Rodri Envíos PRO MAX</h2>

<h3>⚙️ Cambio del día</h3>
<input type="text" id="usdtars" placeholder="USDT ARS (ej: 1450)">
<input type="text" id="usdtbs" placeholder="USDT Bs (ej: 9.45)">
<button onclick="guardarCambio()">💾 Guardar cambio</button>

<hr>

<h3>💰 Operación</h3>

<input type="text" id="monto" placeholder="Monto (ARS o Bs)">

<select id="modo">
  <option value="bs_ars">Bs → ARS</option>
  <option value="ars_bs">ARS → Bs</option>
  <option value="bo_ar">Bolivia → Argentina</option>
</select>

<label>
<input type="checkbox" id="vip"> Cliente frecuente ⭐
</label>

<button onclick="calcular()">Calcular</button>
<button class="copy" onclick="copiar()">📲 Copiar</button>

<div class="result" id="resultado"></div>
<div class="small" id="detalle"></div>

<script>

let mensaje = "";

// convertir seguro
function num(v){
  if(!v) return 0;
  return parseFloat(v.toString().replace(",", "."));
}

// guardar cambio
function guardarCambio(){
  let ars = num(document.getElementById("usdtars").value);
  let bs = num(document.getElementById("usdtbs").value);

  if(ars<=0 || bs<=0){
    alert("Valores inválidos ⚠️");
    return;
  }

  let tipoReal = ars / bs;

  localStorage.setItem("tipoReal", tipoReal);
  localStorage.setItem("usdtars", ars);
  localStorage.setItem("usdtbs", bs);

  alert("Cambio guardado ✔");
}

// rangos
function porcentaje(bs){
  if(bs >= 100 && bs <= 300) return 8;
  if(bs <= 700) return 7;
  if(bs <= 1000) return 6.5;
  if(bs <= 1500) return 6;
  if(bs <= 2500) return 5;
  if(bs <= 4000) return 4.5;
  if(bs <= 6000) return 4;
  return 3;
}

// calcular
function calcular(){

  let monto = num(document.getElementById("monto").value);
  let modo = document.getElementById("modo").value;
  let tipoReal = num(localStorage.getItem("tipoReal"));

  if(tipoReal<=0){
    alert("Primero guarda el cambio ⚠️");
    return;
  }

  if(monto<=0){
    alert("Monto inválido ⚠️");
    return;
  }

  let vip = document.getElementById("vip").checked;

  // 🔹 Bs → ARS
  if(modo === "bs_ars"){

    let bs = monto;
    let p = porcentaje(bs);

    if(vip && bs>=300 && bs<=2000){
      p -= 0.5;
    }

    let tipoFinal = tipoReal * (1 + p/100);
    let total = bs * tipoFinal;

    document.getElementById("resultado").innerHTML =
      "💰 Cobrar: " + total.toLocaleString() + " ARS";

    document.getElementById("detalle").innerHTML =
      "📊 " + p + "% aplicado";

    mensaje = "💸 Envío a Bolivia 🇧🇴\n" +
              "Monto: " + bs + " Bs\n" +
              "Total: " + total.toLocaleString() + " ARS\n" +
              "✔ Seguro y confiable";
  }

  // 🔹 ARS → Bs
  if(modo === "ars_bs"){

    let ars = monto;

    let bsEstimado = ars / tipoReal;
    let p = porcentaje(bsEstimado);

    if(vip && bsEstimado>=300 && bsEstimado<=2000){
      p -= 0.5;
    }

    let tipoFinal = tipoReal * (1 + p/100);
    let bsFinal = ars / tipoFinal;

    document.getElementById("resultado").innerHTML =
      "💸 Recibe: " + bsFinal.toFixed(2) + " Bs";

    document.getElementById("detalle").innerHTML =
      "📊 " + p + "% aplicado";

    mensaje = "💸 Envío a Bolivia 🇧🇴\n" +
              "Envías: " + ars.toLocaleString() + " ARS\n" +
              "Recibes: " + bsFinal.toFixed(2) + " Bs\n" +
              "✔ Seguro y confiable";
  }

  // 🔹 Bolivia → Argentina
  if(modo === "bo_ar"){

    let bs = monto;

    let p = porcentaje(bs) + 1; // margen extra

    let tipoFinal = tipoReal * (1 + p/100);
    let ars = bs * tipoFinal;

    document.getElementById("resultado").innerHTML =
      "💰 Recibe: " + ars.toLocaleString() + " ARS";

    document.getElementById("detalle").innerHTML =
      "📊 " + p + "% aplicado";

    mensaje = "💸 Envío a Argentina 🇦🇷\n" +
              "Envías: " + bs + " Bs\n" +
              "Recibes: " + ars.toLocaleString() + " ARS\n" +
              "✔ Seguro y confiable";
  }
}

// copiar
function copiar(){
  if(!mensaje){
    alert("Primero calcula ⚠️");
    return;
  }
  navigator.clipboard.writeText(mensaje);
  alert("Mensaje copiado ✔");
}

// cargar datos
window.onload = function(){
  document.getElementById("usdtars").value = localStorage.getItem("usdtars") || "";
  document.getElementById("usdtbs").value = localStorage.getItem("usdtbs") || "";
}

</script>

</body>
</html>
